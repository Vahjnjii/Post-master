# Cloudflare Wrangler Configuration for Pages

name = "post-cloud-app"
pages_build_output_dir = "dist"
compatibility_date = "2024-04-01"
compatibility_flags = [ "nodejs_compat" ]

[env.production]
# Bindings and variables MUST be inside the environment block for inheritance
vars = { APP_URL = "https://your-app.pages.dev", JWT_SECRET = "REPLACE_WITH_SECURE_RANDOM_STRING", GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "post_cloud_db"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"
